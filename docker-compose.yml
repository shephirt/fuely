# Production — pulls the pre-built image from GitHub Container Registry.
# Usage:
#   cp .env.example .env   # fill in TANKERKOENIG_API_KEY
#   docker compose up -d

services:
  fuely:
    image: ghcr.io/shephirt/fuely:latest
    ports:
      - "127.0.0.1:8080:3000"
    env_file:
      - .env
    volumes:
      - fuely-data:/app/data
    restart: unless-stopped

volumes:
  fuely-data:
