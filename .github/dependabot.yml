version: 2
updates:

  # ── Frontend npm dependencies ────────────────────────────────────────
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: "chore(frontend)"

  # ── Backend npm dependencies ─────────────────────────────────────────
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: "chore(backend)"

  # ── Dockerfile base image ────────────────────────────────────────────
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    labels:
      - dependencies
    commit-message:
      prefix: "chore(docker)"

  # ── GitHub Actions ───────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    labels:
      - dependencies
    commit-message:
      prefix: "chore(ci)"
