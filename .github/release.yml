# GitHub's automatic release notes configuration.
# Groups pull requests into sections in every generated release body.
# Docs: https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  exclude:
    labels:
      - skip-changelog   # PRs with this label are omitted from release notes entirely
  categories:
    - title: "New Features"
      labels:
        - feature
        - enhancement
    - title: "Bug Fixes"
      labels:
        - bug
        - fix
    - title: "Documentation"
      labels:
        - documentation
        - docs
    - title: "Maintenance"
      labels:
        - chore
        - dependencies
        - refactor
    - title: "Other Changes"
      labels:
        - "*"
