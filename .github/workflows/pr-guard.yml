name: PR Guard – Main Branch Policy

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - labeled
      - unlabeled
      - synchronize

jobs:
  check-pr-policy:
    name: Check PR source branch
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Evaluate PR policy
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const sourceBranch = pr.head.ref;
            const labels = pr.labels.map(l => l.name);

            const isFromStaging = sourceBranch === 'staging';
            const hasChoreLabel = labels.includes('chore');

            if (isFromStaging || hasChoreLabel) {
              console.log(`PR allowed. Source: "${sourceBranch}", Labels: [${labels.join(', ')}]`);
              return;
            }

            // Post a comment explaining the policy
            const labelList = labels.length ? labels.join(', ') : '(none)';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: [
                '## PR blocked — main branch policy',
                '',
                'Only the following PRs may target `main`:',
                '- PRs from the `staging` branch',
                '- PRs with the `chore` label',
                '',
                `**This PR:** source branch \`${sourceBranch}\`, labels: \`${labelList}\``,
                '',
                'Please retarget this PR to `staging`, or add the `chore` label if this is a maintenance change.',
              ].join('\n'),
            });

            core.setFailed(
              `PRs into main must come from "staging" or carry the "chore" label. ` +
              `This PR is from "${sourceBranch}" with labels: [${labelList}].`
            );
