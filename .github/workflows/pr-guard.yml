name: PR Guard

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - labeled
      - unlabeled
      - synchronize

jobs:
  # ── Policy check ─────────────────────────────────────────────────────
  # Passes when the PR comes from "staging" OR carries the "chore" label.
  # Set this job ("Source branch policy") as a required status check in
  # Settings → Branches → main → Branch protection rules.
  policy:
    name: Source branch policy
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Check source branch and labels
        env:
          SOURCE_BRANCH: ${{ github.event.pull_request.head.ref }}
          LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        uses: actions/github-script@v7
        with:
          script: |
            const source = process.env.SOURCE_BRANCH;
            const labels = JSON.parse(process.env.LABELS);
            const prNumber = parseInt(process.env.PR_NUMBER, 10);

            const allowed = source === 'staging' || labels.includes('chore');

            if (allowed) {
              console.log(`✅ Allowed — source: "${source}", labels: [${labels.join(', ')}]`);
              return;
            }

            const labelList = labels.length ? labels.join(', ') : '(none)';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: [
                '## ❌ PR blocked — `main` branch policy',
                '',
                'Pull requests into `main` must either:',
                '- originate from the `staging` branch, **or**',
                '- carry the `chore` label (for maintenance / hotfix changes)',
                '',
                '| | Value |',
                '|---|---|',
                `| **Source branch** | \`${source}\` |`,
                `| **Labels** | ${labelList} |`,
                '',
                '**What to do:**',
                '- Retarget this PR to `staging` and merge it there first, or',
                '- Add the `chore` label if this is a maintenance change that must go directly to `main`.',
              ].join('\n'),
            });

            core.setFailed(
              `PRs into main must come from "staging" or have the "chore" label. ` +
              `Source: "${source}", labels: [${labelList}].`
            );
