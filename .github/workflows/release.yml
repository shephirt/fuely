name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to (re-)publish, e.g. v0.1.0"
        required: true
        type: string

permissions:
  contents: write        # create GitHub Releases
  packages: write        # push to ghcr.io

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Derive metadata ─────────────────────────────────────────
      # On tag push:        VERSION = the git tag (e.g. v0.1.0)
      # On manual dispatch: VERSION = the user-supplied input
      - name: Extract metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          VERSION_PLAIN="${VERSION#v}"
          GIT_REVISION="${GITHUB_SHA::7}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "version=${VERSION}"             >> "$GITHUB_OUTPUT"
          echo "version_plain=${VERSION_PLAIN}" >> "$GITHUB_OUTPUT"
          echo "git_revision=${GIT_REVISION}"   >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}"       >> "$GITHUB_OUTPUT"

      # ── 3. Set up Docker Buildx ────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Log in to GitHub Container Registry ─────────────────────
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 5. Build and push image ────────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/shephirt/fuely:${{ steps.meta.outputs.version }}
            ghcr.io/shephirt/fuely:latest
          build-args: |
            VERSION=${{ steps.meta.outputs.version_plain }}
            GIT_REVISION=${{ steps.meta.outputs.git_revision }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 6. Create GitHub Release (tag-push only) ───────────────────
      # Skipped on manual workflow_dispatch to avoid duplicate release notes.
      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          name: "Fuely ${{ steps.meta.outputs.version }}"
          generate_release_notes: true
          body: |
            ## Docker image

            ```bash
            # Pull and run (requires TANKERKOENIG_API_KEY in .env)
            docker pull ghcr.io/shephirt/fuely:${{ steps.meta.outputs.version }}
            docker compose up -d
            ```

            **Full image reference:** `ghcr.io/shephirt/fuely:${{ steps.meta.outputs.version }}`

            ---
